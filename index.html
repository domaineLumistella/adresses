<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domaine Lumistella — Nos bonnes adresses</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brun:    #8B6A57;
    --brun-dk: #6B5043;
    --creme:   #F0EDD8;
    --or:      #E8D9B0;
    --or-pale: #F5EFD6;
    --texte:   #3A2D25;
    --gris:    #7A6A60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--creme); color: var(--texte); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }

  header { background: var(--brun); color: var(--or); text-align: center; padding: 2.4rem 1.2rem 2rem; }
  .star-svg { width: 52px; height: 52px; margin-bottom: 0.6rem; opacity: 0.92; }
  .stars { font-size: 0.55em; letter-spacing: 0.15em; vertical-align: super; margin-left: 0.3em; opacity: 0.85; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 5vw, 2rem); font-weight: 400; color: var(--or); }
  header p { font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--or); opacity: 0.75; margin-top: 0.35rem; }

  nav { background: var(--brun-dk); display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 0.5rem; position: sticky; top: 0; z-index: 10; }
  nav::-webkit-scrollbar { display: none; }
  nav a { flex: 0 0 auto; color: var(--or); opacity: 0.65; text-decoration: none; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.85rem 0.9rem; white-space: nowrap; transition: opacity .2s; border-bottom: 2px solid transparent; cursor: pointer; }
  nav a:hover, nav a.active { opacity: 1; border-bottom-color: var(--or); }

  main { padding: 0 0 3rem; }
  section { padding: 2rem 1rem 0.5rem; max-width: 640px; margin: 0 auto; }
  .section-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--or); }
  .section-icon { font-size: 1.3rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 400; color: var(--brun); }
  .cards { display: flex; flex-direction: column; gap: 0.65rem; }

  .card { background: white; border-radius: 10px; padding: 0.9rem 1rem; display: flex; align-items: flex-start; gap: 0.8rem; border: 1px solid rgba(139,106,87,.12); transition: box-shadow .2s, transform .15s; text-decoration: none; color: inherit; }
  .card:active { transform: scale(0.985); }
  a.card:hover { box-shadow: 0 3px 14px rgba(139,106,87,.15); }
  .card.no-link { opacity: 0.6; }
  .card-body { flex: 1; min-width: 0; }
  .card-name { font-size: 0.92rem; font-weight: 500; color: var(--texte); line-height: 1.3; }
  .card-comment { font-size: 0.78rem; color: var(--gris); margin-top: 0.2rem; font-style: italic; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.35rem; align-items: center; }
  .card-arrow { color: var(--brun); opacity: 0.35; font-size: 1rem; margin-top: 0.1rem; flex-shrink: 0; }

  .badge { font-size: 0.68rem; font-weight: 500; padding: 0.18rem 0.5rem; border-radius: 20px; letter-spacing: 0.04em; }
  .badge-p1 { background: #EAF5EA; color: #2E7D32; }
  .badge-p2 { background: #FFF8E1; color: #F57F17; }
  .badge-p3 { background: #FFF3E0; color: #E65100; }
  .badge-p4 { background: #FCE4EC; color: #880E4F; }
  .badge-tag { background: var(--or-pale); color: var(--brun-dk); }
  .badge-confirm { background: #F3F0EC; color: var(--gris); }

  /* Badges spéciaux par tag */
  .tag-michelin      { background: #FFF8E1; color: #c8a000; }
  .tag-coupdecoeur   { background: #FCE4EC; color: #c62828; }
  .tag-livraison     { background: #E3F2FD; color: #1565C0; }
  .tag-vue-mer       { background: #E0F7FA; color: #006064; }
  .tag-apied         { background: #E8F5E9; color: #2E7D32; }
  .tag-voiture       { background: #F3F0EC; color: var(--gris); }

  /* États */
  #loading, #error { text-align: center; padding: 3rem 1rem; color: var(--gris); font-size: 0.9rem; max-width: 640px; margin: 0 auto; }
  #error { color: #c0392b; }

  footer { text-align: center; padding: 2rem 1rem 1.5rem; font-size: 0.72rem; color: var(--gris); letter-spacing: 0.08em; text-transform: uppercase; border-top: 1px solid var(--or); max-width: 640px; margin: 0 auto; }
  footer a { color: var(--brun); text-decoration: none; }
</style>
</head>
<body>

<header>
  <svg class="star-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#E8D9B0" stroke-linecap="round">
      <line x1="50" y1="10" x2="50" y2="90" stroke-width="1.2"/>
      <line x1="10" y1="50" x2="90" y2="50" stroke-width="1.2"/>
      <line x1="22" y1="22" x2="78" y2="78" stroke-width="0.9"/>
      <line x1="78" y1="22" x2="22" y2="78" stroke-width="0.9"/>
      <line x1="32" y1="14" x2="68" y2="86" stroke-width="0.6"/>
      <line x1="68" y1="14" x2="32" y2="86" stroke-width="0.6"/>
      <line x1="14" y1="32" x2="86" y2="68" stroke-width="0.6"/>
      <line x1="86" y1="32" x2="14" y2="68" stroke-width="0.6"/>
    </g>
    <polygon points="50,42 52.5,47.5 58,50 52.5,52.5 50,58 47.5,52.5 42,50 47.5,47.5" fill="#E8D9B0"/>
  </svg>
  <h1>Domaine Lumistella<span class="stars">★★★★</span></h1>
  <p>Nos bonnes adresses · Porticcio</p>
</header>

<nav id="mainnav"></nav>
<main id="main">
  <div id="loading">Chargement des adresses…</div>
</main>

<footer>
  <p>Domaine Lumistella · Porticcio, Golfe d'Ajaccio</p>
  <p style="margin-top:0.4rem"><a href="https://linktr.ee/domainelumistella">↗ Retour au Linktree</a></p>
</footer>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vShGQqd2LQ9XnhPVTf4DRVXMMmpnGxqCcs-mkmDWmOmET9SEqFF3W6fojozOXsE9uDX0JZJ-DlLvgx7/pub?gid=0&single=true&output=csv';

// Mapping slug → {label, emoji}
// Si une catégorie inconnue est trouvée dans le Sheets, elle sera affichée avec 📍
const CATEGORIES = {
  manger:     { label: 'Restaurants',      emoji: '🍽' },
  paillottes: { label: 'Paillottes',       emoji: '🏖' },
  emporter:   { label: 'À emporter',       emoji: '🥡' },
  sports:     { label: 'Sports & Loisirs', emoji: '🏄' },
  sorties:    { label: 'Sorties',          emoji: '🗺' },
  enfants:    { label: 'Enfants',          emoji: '👧' },
  plages:     { label: 'Plages',           emoji: '🏝' },
  bateaux:    { label: 'Bateaux & Jets',   emoji: '⛵' },
  bienetre:   { label: 'Bien-être',        emoji: '💆' },
  services:   { label: 'Nos services',      emoji: '🏠' },
};

// Badges spéciaux pour certains tags (couleur de fond spécifique)
const TAG_CLASSES = {
  michelin:              'tag-michelin',
  'coup de coeur':       'tag-coupdecoeur',
  livraison:             'tag-livraison',
  'vue-mer':             'tag-vue-mer',
  'accessible à pied':   'tag-apied',
  '< 10 minutes en voiture': 'tag-voiture',
};

// Label affiché + emoji pour chaque tag
const TAG_LABELS = {
  'accessible à pied':       '🚶 À pied',
  'coup de coeur':           '❤️ Coup de cœur',
  'livraison':               '🛵 Livraison',
  'michelin':                '⭐ Guide Michelin',
  'terrasse':                '☀️ Terrasse',
  'vue-mer':                 '🌊 Vue mer',
  '< 10 minutes en voiture': '🚗 < 10 min',
};

const PRIX_CONFIG = {
  1: { label: '€',    cls: 'badge-p1' },
  2: { label: '€€',   cls: 'badge-p2' },
  3: { label: '€€€',  cls: 'badge-p3' },
  4: { label: '€€€€', cls: 'badge-p4' },
};

// ─── CSV PARSER ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    // Gestion basique des champs entre guillemets
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim());
    return obj;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function buildSite(rows) {
  // Filtrer les lignes visibles
  const visible = rows.filter(r => r['Visible'] && r['Visible'].toLowerCase() === 'oui' && r['Nom']);

  // Grouper par catégorie en préservant l'ordre d'apparition
  const catOrder = [];
  const grouped = {};
  visible.forEach(r => {
    const cat = (r['Catégorie'] || '').toLowerCase().trim();
    if (!grouped[cat]) { grouped[cat] = []; catOrder.push(cat); }
    grouped[cat].push(r);
  });

  // Nav
  const nav = document.getElementById('mainnav');
  nav.innerHTML = catOrder.map(cat => {
    const info = CATEGORIES[cat] || { label: cat, emoji: '📍' };
    return `<a href="#cat-${cat}">${info.emoji} ${info.label}</a>`;
  }).join('');

  // Sections
  const main = document.getElementById('main');
  main.innerHTML = catOrder.map(cat => {
    const info = CATEGORIES[cat] || { label: cat, emoji: '📍' };
    const cards = grouped[cat].map(r => buildCard(r)).join('');
    return `
      <section id="cat-${cat}">
        <div class="section-header">
          <span class="section-icon">${info.emoji}</span>
          <h2 class="section-title">${info.label}</h2>
        </div>
        <div class="cards">${cards}</div>
      </section>`;
  }).join('');

  // Active nav on scroll
  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('nav a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const active = document.querySelector(`nav a[href="#${entry.target.id}"]`);
        if (active) { active.classList.add('active'); active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });
  sections.forEach(s => observer.observe(s));
}

function buildCard(r) {
  const nom       = r['Nom'] || '';
  const lien      = r['Lien maps'] || '';
  const comment   = r['Commentaire personnel'] || '';
  const prixRaw   = parseInt(r['Prix'], 10);
  const tagsRaw   = r['Tags'] || '';

  // Tags : split sur ", " ou "," 
  const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);

  // Badges prix
  let prixBadge = '';
  if (prixRaw >= 1 && prixRaw <= 4) {
    const p = PRIX_CONFIG[prixRaw];
    prixBadge = `<span class="badge ${p.cls}">${p.label}</span>`;
  }

  // Badges tags
  const tagBadges = tags.map(t => {
    const cls   = TAG_CLASSES[t] || 'badge-tag';
    const label = TAG_LABELS[t]  || t;
    return `<span class="badge ${cls}">${label}</span>`;
  }).join('');

  const meta = (prixBadge || tagBadges) ? `<div class="card-meta">${prixBadge}${tagBadges}</div>` : '';
  const commentHtml = comment ? `<div class="card-comment">${comment}</div>` : '';

  if (lien) {
    return `<a class="card" href="${lien}" target="_blank" rel="noopener">
      <div class="card-body">
        <div class="card-name">${nom}</div>
        ${commentHtml}
        ${meta}
      </div>
      <span class="card-arrow">›</span>
    </a>`;
  } else {
    return `<div class="card no-link">
      <div class="card-body">
        <div class="card-name">${nom}</div>
        ${commentHtml}
        ${meta}
      </div>
    </div>`;
  }
}

// ─── FETCH ───────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const bust = `&t=${Date.now()}`;
    const resp = await fetch(SHEET_CSV_URL + bust, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    const rows = parseCSV(text);
    buildSite(rows);
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div id="error">Impossible de charger les données.<br><small>${e.message}</small></div>`;
  }
}

loadData();
</script>
</body>
</html>
